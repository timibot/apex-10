name: Annual Model Retrain

on:
  schedule:
    - cron: "0 2 1 1 *"    # 1st January at 02:00 UTC every year
  workflow_dispatch:         # Manual trigger for out-of-cycle retrains

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # Optuna 100 trials × 2 models ≈ 40–60 min

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run annual retrain
        run: python -m apex10.live.retrain

      - name: Notify Discord — failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "🚨 APEX-10 Annual Retrain FAILED — check GitHub Actions logs"}' \
            $DISCORD_WEBHOOK
