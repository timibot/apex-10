name: APEX-10 Thursday Settlement

on:
  schedule:
    - cron: '0 8 * * 4'   # Every Thursday at 08:00 UTC
  workflow_dispatch:        # Manual trigger button

jobs:
  settlement:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 226 rows × 1.5s TheSportsDB delay ≈ ~6 min

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run settlement
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          APEX_ENV: production
        run: python -m apex10.live.settlement
